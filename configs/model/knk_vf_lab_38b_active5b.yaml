name: knk_vf_lab_38b_active5b
display_name: "KNK-VF Lab 38B Active-5.3B"
owner: "NULLXES"
contact: "ceo@nullxes.com"
model:
  vocab_size: 128000
  max_position_embeddings: 131072
  num_layers: 40
  hidden_size: 3584
  num_attention_heads: 28
  num_key_value_heads: 7
  head_dim: 128
  rope_theta: 1000000.0
  rope_scaling: yarn
  attention_pattern:
    type: hybrid
    local_window: 4096
    global_every: 4
  dense_prefix_layers: 4
  ffn_hidden_size: 9626
  expert_ffn_hidden_size: 1408
  num_routed_experts: 64
  num_shared_experts: 1
  routed_top_k: 4
  router:
    type: normalized_sigmoid
    gate_dtype: fp32
    load_balance: smebu
  norm: rmsnorm
  norm_eps: 1.0e-6
  use_bias: false
  tie_embeddings: false
  z_loss_coefficient: 1.0e-5
parameter_targets:
  active_params_min: 4800000000
  active_params_max: 6200000000
  total_params_min: 36000000000
  total_params_max: 42000000000
estimated_parameters:
  total_params: 38050000000
  active_params: 5350000000
training:
  precision: bf16
  hardware: h200
tokenizer:
  config: configs/tokenizer/knk_vf_tokenizer_128k.yaml
  chat_template: knk_vf_chat_v2
notes:
  - "Lab-scale KNK-VF MoE for 1x H200 tokenizer and routing validation."
  - "Same block family as 153B: GQA, hybrid attention, sigmoid MoE, SME-BU."
  - "Not for production frontier training; bridge before 153B/1T datacenter runs."
