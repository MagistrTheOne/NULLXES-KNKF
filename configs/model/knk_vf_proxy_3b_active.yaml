name: knk_vf_proxy_3b_active
model:
  vocab_size: 128000
  max_position_embeddings: 32768
  num_layers: 24
  hidden_size: 2048
  num_attention_heads: 16
  num_key_value_heads: 4
  head_dim: 128
  rope_theta: 1000000.0
  rope_scaling: yarn
  attention_pattern:
    type: hybrid
    local_window: 4096
    global_every: 4
  dense_prefix_layers: 2
  ffn_hidden_size: 5504
  expert_ffn_hidden_size: 8192
  num_routed_experts: 64
  num_shared_experts: 1
  routed_top_k: 4
  router:
    type: normalized_sigmoid
    gate_dtype: fp32
    load_balance: aux_loss
  norm: rmsnorm
  norm_eps: 1.0e-6
  use_bias: false
  tie_embeddings: false
  z_loss_coefficient: 1.0e-5
parameter_targets:
  active_params_min: 2500000000
  active_params_max: 4000000000
  total_params_min: 12000000000
  total_params_max: 18000000000
training:
  precision: bf16
  hardware: h200
