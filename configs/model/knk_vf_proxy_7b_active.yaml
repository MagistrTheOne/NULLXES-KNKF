name: knk_vf_proxy_7b_active
model:
  vocab_size: 128000
  max_position_embeddings: 65536
  num_layers: 32
  hidden_size: 3072
  num_attention_heads: 24
  num_key_value_heads: 6
  head_dim: 128
  rope_theta: 1000000.0
  rope_scaling: yarn
  attention_pattern:
    type: hybrid
    local_window: 4096
    global_every: 4
  dense_prefix_layers: 4
  ffn_hidden_size: 8192
  expert_ffn_hidden_size: 8192
  num_routed_experts: 96
  num_shared_experts: 1
  routed_top_k: 6
  router:
    type: normalized_sigmoid
    gate_dtype: fp32
    load_balance: aux_loss
  norm: rmsnorm
  norm_eps: 1.0e-6
  use_bias: false
  tie_embeddings: false
  z_loss_coefficient: 1.0e-5
parameter_targets:
  active_params_min: 6000000000
  active_params_max: 9000000000
  total_params_min: 35000000000
  total_params_max: 50000000000
training:
  precision: bf16
  hardware: h200
