# KUROTAMA Magistr-style SFT lab on Meta Llama 3.1 8B (1x H200 LoRA smoke).
# Corpus: data/kurotama/kurotama_sharegpt.jsonl (500 dialogs).

model_name_or_path: meta-llama/Meta-Llama-3.1-8B-Instruct
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all

dataset_dir: data/kurotama
dataset: kurotama_sharegpt
template: llama3
cutoff_len: 4096
max_samples: 500
overwrite_cache: true
preprocessing_num_workers: 4

output_dir: /workspace/outputs/kurotama-llama31-8b-lora
logging_steps: 10
save_steps: 100
plot_loss: true
report_to: none

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 8.0e-5
num_train_epochs: 2
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
flash_attn: sdpa
gradient_checkpointing: true

val_size: 0.08
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
