# NULLXES one-shot H200 pipeline validation via LLaMA-Factory (~2h target).
# Uses Qwen2.5-7B as stand-in; validates corpus + chat style + SFT loop.

model_name_or_path: Qwen/Qwen2.5-7B-Instruct
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all

dataset_dir: data/llamafactory
dataset: nullxes_sharegpt
template: qwen
cutoff_len: 4096
max_samples: 2000
overwrite_cache: true
preprocessing_num_workers: 4

output_dir: /workspace/outputs/nullxes-llamafactory-7b-lora
logging_steps: 10
save_steps: 250
plot_loss: true
report_to: none

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
flash_attn: fa2
gradient_checkpointing: true

val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 250
