name: proxy_h200_fsdp
model_config: configs/model/knk_vf_proxy_3b_active.yaml
hardware:
  gpu: h200_sxm
  gpus_per_node: 4
distributed:
  backend: nccl
  strategy: fsdp
  gradient_checkpointing: true
optimizer:
  type: adamw
  learning_rate: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
scheduler:
  type: wsd
  warmup_ratio: 0.02
data:
  mix_config: configs/data/pretrain_mix_tier1.yaml
  sequence_length_curriculum: [8192, 32768]
monitoring:
  log_every: 10
  metrics: [loss, grad_norm, tokens_per_second, expert_utilization, router_entropy]
stop_rules:
  max_loss_spike_ratio: 2.0
  expert_collapse_threshold: 0.40
